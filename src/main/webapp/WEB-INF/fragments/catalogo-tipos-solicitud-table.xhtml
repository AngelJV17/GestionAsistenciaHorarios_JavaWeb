<?xml version='1.0' encoding='UTF-8'?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:form>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 system-table">
                <thead class="table-primary"><tr><th class="ps-4">Código</th><th>Nombre</th><th>Aprobación</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                <tbody>
                    <ui:repeat value="#{catalogosController.listaTiposSolicitud}" var="item">
                        <tr>
                            <td class="ps-4"><strong>#{item.codigo}</strong></td>
                            <td>#{item.nombre}</td>
                            <td>#{item.requiereAprobacion ? 'Sí' : 'No'}</td>
                            <td><span class="#{item.activo ? 'badge approved' : 'badge rejected'}">#{item.activo ? 'Activo' : 'Inactivo'}</span></td>
                            <td class="text-center">
                                <h:commandLink styleClass="btn btn-sm btn-outline-primary me-1" action="#{catalogosController.editarTipoSolicitud(item.id)}"><i class="fas fa-pen-to-square"></i></h:commandLink>
                                <h:commandLink styleClass="btn btn-sm btn-outline-danger" action="#{catalogosController.cambiarEstadoTipoSolicitud(item.id)}"><i class="fas #{item.activo ? 'fa-ban' : 'fa-check'}"></i></h:commandLink>
                            </td>
                        </tr>
                    </ui:repeat>
                    <h:panelGroup rendered="#{empty catalogosController.listaTiposSolicitud}"><tr><td colspan="5" class="text-center text-muted py-4">No hay tipos de solicitud registrados.</td></tr></h:panelGroup>
                </tbody>
            </table>
        </div>
    </h:form>
</ui:composition>
